name: web-ci

on:
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"
  push:
    branches: [main]
    paths:
      - "web/**"

jobs:
  test:
    name: Typecheck + Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npx vitest run
